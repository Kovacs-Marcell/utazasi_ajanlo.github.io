<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat - Kis Libák</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="kepek/kep.jpg" type="image/x-icon">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-globe-asia"></i>
                <span>Kis Libák</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Főoldal</a></li>
                <li><a href="rolunk.html">Rólunk</a></li>
                <li><a href="uticelpontok.html">Úticélok</a></li>
                <li><a href="kapcsolat.html" class="active">Kapcsolat</a></li>
            </ul>
            <button id="darkModeToggle" class="dark-mode-btn">
                <i class="fas fa-moon"></i>
            </button>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <div class="page-header-content">
                <h1>Kapcsolat</h1>
                <p>Vedd fel velünk a kapcsolatot</p>
            </div>
        </section>

        <section class="contact-section">
            <div class="contact-container">
                <div class="contact-info">
                    <h2>Elérhetőségeink</h2>
                    <div class="info-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div>
                            <h3>Cím</h3>
                            <p>1052 Budapest, Váci utca 15.</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-phone"></i>
                        <div>
                            <h3>Telefon</h3>
                            <p>06(50)297-74-39 </p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-envelope"></i>
                        <div>
                            <h3>Email</h3>
                            <p>utazaskislibak@gmail.com</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <div>
                            <h3>Nyitvatartás</h3>
                            <p>H-P: 9:00 - 18:00<br>Sz: 9:00 - 13:00</p>
                        </div>
                    </div>

                    <div class="map-container">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2695.6022821249733!2d19.05270531564236!3d47.49734297917658!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741dc4b7f0b86e5%3A0x3aee8b1e984aba72!2sV%C3%A1ci%20utca%2C%20Budapest!5e0!3m2!1shu!2shu!4v1620000000000!5m2!1shu!2shu" 
                            allowfullscreen="" 
                            loading="lazy">
                        </iframe>
                    </div>
                </div>

                <div class="contact-form">
                    <h2>Küldj üzenetet!</h2>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="name">Név *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email cím *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Tárgy</label>
                            <select id="subject" name="subject">
                                <option value="general">Általános kérdés</option>
                                <option value="booking">Utazás foglalás</option>
                                <option value="partnership">Együttműködés</option>
                                <option value="other">Egyéb</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Üzenet *</label>
                            <textarea id="message" name="message" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Küldés</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    

    <script src="script.js"></script>
</body>
</html>
